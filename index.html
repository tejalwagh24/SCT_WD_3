<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>THE GOD MACHINE — Cognitive Evaluation Protocol</title>

  <!-- FONT -->

  <link rel="preconnect"
  href="https://fonts.googleapis.com">

  <link rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap"
  rel="stylesheet">

  <!-- CSS -->

  <link rel="stylesheet"
  href="style.css">

</head>

<body>

  <!-- PARTICLE CANVAS -->

  <canvas id="bg"></canvas>


  <!-- OVERLAY -->

  <div class="overlay"></div>


  <!-- MAIN -->

  <main class="machine">


    <!-- STATUS -->

    <header class="topbar">

      <div class="status">

        <span class="pulse"></span>

        consciousness unstable

      </div>


      <div class="metrics">

        <div>

          <p>PHASE</p>

          <h3 id="phase">
            01
          </h3>

        </div>


        <div>

          <p>SCORE</p>

          <h3 id="score">
            0
          </h3>

        </div>


        <div>

          <p>TIMER</p>

          <h3 id="timer">
            15
          </h3>

        </div>

      </div>

    </header>


    <!-- MAIN CONTENT -->

    <section class="core">


      <p class="system-text">

        THE GOD MACHINE

      </p>


      <h1 id="question">

        signal detected.

      </h1>


      <p id="analysis">

        interaction required for calibration

      </p>


      <!-- OPTIONS -->

      <div class="options"
      id="options">

      </div>


      <!-- NEXT -->

      <button id="next-btn">

        continue evaluation

      </button>

    </section>


    <!-- MEMORY -->

    <section class="memory">

      <p class="memory-title">

        MACHINE MEMORY

      </p>

      <div id="memory-log">

      </div>

    </section>

  </main>


  <!-- SCRIPT -->

  <script src="script.js"></script>

</body>
</html>
